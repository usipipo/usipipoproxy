name: CI

on:
  push:
    branches: [main, develop, "feature/*"]
    tags: ['v*']
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Runs lint/typecheck/test on any Python project that changed
  python-check:
    name: Python CI
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [apps/backend, apps/bot]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Sync dependencies (workspace)
        run: |
          cd ${{ matrix.app }}
          uv sync

      - name: Lint (Ruff)
        run: |
          cd ${{ matrix.app }}
          uv run ruff check src/ tests/

      - name: Format check (Ruff)
        run: |
          cd ${{ matrix.app }}
          uv run ruff format src/ tests/ --check

      - name: Type check (Mypy)
        run: |
          cd ${{ matrix.app }}
          uv run mypy src/

      - name: Test (Pytest)
        run: |
          cd ${{ matrix.app }}
          uv run pytest tests/unit -v

      - name: Security scan (Bandit)
        run: |
          cd ${{ matrix.app }}
          uv run bandit -r src/ -ll -ii

  # Docker build for apps that have a Dockerfile
  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: python-check
    if: ${{ contains(github.ref, 'refs/tags/') }}
    strategy:
      matrix:
        app: [apps/bot]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v5

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.app }}
          push: true
          tags: |
            ghcr.io/uSipipo-Team/${{ matrix.app }}-telegram:${{ steps.version.outputs.VERSION }}
            ghcr.io/uSipipo-Team/${{ matrix.app }}-telegram:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  workspace-test:
    name: uv workspace sync
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Validate workspace
        run: |
          uv sync
          uv run --project apps/bot python -c "import usipipo_commons; print('ok')"
