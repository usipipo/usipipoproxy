name: Python CI
on: workflow_call

jobs:
  lint-type-test:
    name: Lint + Typecheck + Test + Security
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [apps/backend, apps/bot]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - run: |
          cd ${{ matrix.app }}
          uv sync

      - name: Ruff check
        run: |
          cd ${{ matrix.app }}
          uv run ruff check src/ tests/

      - name: Format check
        run: |
          cd ${{ matrix.app }}
          uv run ruff format src/ tests/ --check

      - name: Mypy
        run: |
          cd ${{ matrix.app }}
          uv run mypy src/

      - name: Pytest
        run: |
          cd ${{ matrix.app }}
          uv run pytest tests/unit -v

      - name: Bandit
        run: |
          cd ${{ matrix.app }}
          uv run bandit -r src/ -ll -ii
