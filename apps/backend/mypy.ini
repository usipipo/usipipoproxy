[mypy]
python_version = 3.13
strict = false
warn_return_any = false
warn_unused_configs = true
disallow_untyped_defs = false
disallow_incomplete_defs = false
check_untyped_defs = false
disallow_untyped_decorators = false
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
warn_unreachable = false

# Paths
mypy_path = $MYPY_CONFIG_DIR/src

# Import discovery
namespace_packages = true

# Relaxations para código de infraestructura
[mypy-src.infrastructure.*]
disallow_untyped_decorators = false

# Relaxations para tests
[mypy-tests.*]
disallow_untyped_defs = false
disallow_incomplete_defs = false
check_untyped_defs = false
warn_return_any = false
warn_unreachable = false

# Relaxations para schemas (Pydantic usa magia con types)
[mypy-src.shared.schemas.*]
disallow_untyped_defs = false
warn_return_any = false

# Librerías externas sin type stubs
[mypy-usipipo_commons.*]
ignore_missing_imports = True

# VPN providers - subprocess y pathlib tienen tipos complejos
[mypy-src.infrastructure.vpn_providers.*]
disallow_untyped_defs = false
warn_return_any = false
